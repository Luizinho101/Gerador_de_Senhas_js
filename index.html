<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="assets/css/style.css">
    <title>Gerador de Senhas</title>
</head>

<body>
    <header class="main-header">
        <div class="header-container">
            <span class="logo-marca">Gerador de Senhas</span>
        </div>
    </header>
    <section>
        <main class="main-container">
            <div class="div-main">
                <h1>Gerador de Senhas aleatorias</h1>
                <div class="range-container">
                    <p>Tamanho da senha</p>
                    <span id="valor-tamanho">12</span>
                    <input type="range" id="tamanho" min="6" max="30" value="12">
                </div>
                <div class="option-item">
                    <label class="switch">
                        <input type="checkbox" id="letras" checked>
                        <span class="slider-toggle"></span>
                    </label>
                    <span>Letras</span>
                </div>

                <div class="option-item">
                    <label class="switch">
                        <input type="checkbox" id="numeros" checked>
                        <span class="slider-toggle"></span>
                    </label>
                    <span>Números</span>
                </div>

                <div class="option-item">
                    <label class="switch">
                        <input type="checkbox" id="especiais">
                        <span class="slider-toggle"></span>
                    </label>
                    <span>Caracteres Especiais</span>
                </div>
                <button class="botao-gerarsenha" type="button">Gerar senha</button>
                <p></p>
                <input type="text" id="resultado">
                <button>Copiar</button>
            </div>
        </main>
    </section>
    <footer></footer>
    <script src="assets/js/script.js"></script>
</body>

</html>
