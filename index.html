<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Gerador de Senhas</title>
</head>

<body>
    <header></header>
    <section>
        <main>
            <div>
                <h1>Gerador de Senhas aleatorias</h1>
                <p>Tamanho da senha</p>
                <input type="range" id="tamanho" min="6" max="30" value="12">
                <span id="valor-tamanho"></span>
                <div class="option-item">
                    <label class="switch">
                        <input type="checkbox" id="letras" checked>
                        <span class="slider-toggle"></span>
                    </label>
                    <span>Letras</span>
                </div>

                <div class="option-item">
                    <label class="switch">
                        <input type="checkbox" id="numeros" checked>
                        <span class="slider-toggle"></span>
                    </label>
                    <span>Números</span>
                </div>

                <div class="option-item">
                    <label class="switch">
                        <input type="checkbox" id="especiais">
                        <span class="slider-toggle"></span>
                    </label>
                    <span>Caracteres Especiais</span>
                </div>
                <button>Gerar senha</button>
                <p></p>
                <input type="text">
                <button>Copiar</button>
            </div>
        </main>
    </section>
    <footer></footer>
    <script src="assets/JS/script.js"></script>
</body>

</html>
